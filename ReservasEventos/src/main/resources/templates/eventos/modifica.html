<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <!-- ENCABEZADO -->
    <div class="row py-3 mb-3 bg-light rounded">
        <div class="col-md-12">
            <h4 class="mb-0">Modificar Evento</h4>
        </div>
    </div>

    <!-- CARD FORM -->
    <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
            Editar información del evento
        </div>

        <div class="card-body">

            <form th:action="@{/eventos/guardar}" th:object="${evento}" method="post">

                <!-- ID OCULTO -->
                <input type="hidden" th:field="*{idEvento}"/>

                <!-- NOMBRE -->
                <div class="mb-3">
                    <label class="form-label">Nombre del evento</label>
                    <input type="text"
                           th:field="*{nombreEvento}"
                           class="form-control"
                           required>
                </div>

                <!-- DESCRIPCIÓN -->
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea th:field="*{descripcionEvento}"
                              class="form-control"
                              rows="3"></textarea>
                </div>

                <div class="row">

                    <!-- FECHA -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha</label>
                        <input type="date"
                               th:field="*{fechaEvento}"
                               class="form-control"
                               required>
                    </div>

                    <!-- CAPACIDAD -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Capacidad</label>
                        <input type="number"
                               th:field="*{capacidadMaxima}"
                               class="form-control"
                               min="1"
                               required>
                    </div>

                </div>

                <!-- ESTADO -->
                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select th:field="*{eventoActivo}" class="form-select">
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>

                <!-- BOTONES -->
                <div class="d-flex justify-content-between">

                    <a th:href="@{/eventos/listado}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button type="submit"
                            class="btn btn-primary">
                        Guardar cambios
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
