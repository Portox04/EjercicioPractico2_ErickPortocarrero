<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"/>

    <body>

        <header th:replace="~{general/fragmentos :: header}"/>

        <div class="container mt-5">
            <div class="row justify-content-center">

                <div class="col-md-4">
                    <div class="card">

                        <div class="card-header bg-success text-white text-center">
                            <h3>Login</h3>
                        </div>

                        <div class="card-body">

                            <form method="POST" th:action="@{/login}">

                                <div class="mb-3">
                                    <label>Correo</label>
                                    <input type="email"
                                           name="username"
                                           class="form-control"
                                           placeholder="Correo electrónico"/>
                                </div>

                                <div class="mb-3">
                                    <label>Contraseña</label>
                                    <input type="password"
                                           name="password"
                                           class="form-control"/>
                                </div>

                                <button class="btn btn-success w-100">Entrar</button>
                            </form>

                            <div class="text-center mt-3">
                                <a th:href="@{/registro/nuevo}">Registrarse</a><br>
                                <a th:href="@{/registro/recordar}">Recordar usuario</a>
                            </div>

                        </div>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger mt-3">
                        Credenciales incorrectas
                    </div>

                </div>

            </div>
        </div>

        <footer th:replace="~{general/fragmentos :: footer}"/>

    </body>
</html>
