<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="UTF-8">
        <title>Modificar Usuario</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>

    <body class="bg-light">

        <div class="container mt-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Modificar Usuario</h4>
                </div>

                <div class="card-body">

                    <form th:action="@{/usuario/guardar}" th:object="${usuario}" method="post">

                        <!-- ID oculto -->
                        <input type="hidden" th:field="*{idUsuario}"/>

                        <!-- Nombre -->
                        <div class="mb-3">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" class="form-control" th:field="*{nombreCompleto}" required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" th:field="*{correoElectronico}" required>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label">Password (dejar vacío para no cambiar)</label>
                            <input type="password" class="form-control" th:field="*{password}">
                        </div>

                        <!-- Rol -->
                        <div class="mb-3">
                            <label class="form-label">Rol</label>
                            <select class="form-select" th:field="*{rolAsignado.idRol}" required>
                                <option value="">Seleccione rol</option>
                                <option th:each="r : ${roles}"
                                        th:value="${r.idRol}"
                                        th:text="${r.nombreRol}">
                                </option>
                            </select>
                        </div>

                        <!-- Estado -->
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" th:field="*{cuentaActiva}">
                            <label class="form-check-label">
                                Cuenta activa
                            </label>
                        </div>

                        <!-- Botones -->
                        <div class="d-flex justify-content-between">

                            <a th:href="@{/usuario/listado}" class="btn btn-secondary">
                                Cancelar
                            </a>

                            <button type="submit" class="btn btn-success">
                                Guardar cambios
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </body>
</html>
